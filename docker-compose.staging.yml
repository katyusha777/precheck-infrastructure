services:

  api:
    image: shaunders/precheck-api:staging
    stop_grace_period: 16m # 15-minute report deadline plus shutdown margin
    ports:
      - "8889:8749"
    env_file:
      # stack deploy reads this at deploy time and bakes values into the
      # service spec; re-run deploy.sh to pick up .env changes
      - /srv/app/.env
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8749
      REDIS_URL: ${REDIS_URL}
      PRECHECK_JOB_MAX_MINUTES: ${PRECHECK_JOB_MAX_MINUTES:-15}
      PRECHECK_ACCESS_TOKEN: ${PRECHECK_ACCESS_TOKEN:?set PRECHECK_ACCESS_TOKEN (min 24 chars)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TERRA_MODEL: ${OPENAI_TERRA_MODEL:-}
      OPENAI_SOL_MODEL: ${OPENAI_SOL_MODEL:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      TRUST_PROXY: "1" # Caddy fronts the app; rate limiting needs real client IPs
      ANTHROPIC_CONCURRENCY: ${ANTHROPIC_CONCURRENCY:-8}
      OPENAI_CONCURRENCY: ${OPENAI_CONCURRENCY:-8}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
