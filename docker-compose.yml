services:

  precheck:
    image: shaunders/precheck:latest
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      APP_DEBUG: "false"
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      APP_URL: ${APP_URL}
    ports:
      - "8000:80"
#    volumes:
#      - media_library:/var/www/storage/media-library
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
        monitor: 15s


  api:
    image: shaunders/precheck-api:latest
    stop_grace_period: 5s # let in-flight report steps drain on deploys
    ports:
      - "8888:8749"
    env_file:
      # stack deploy reads this at deploy time and bakes values into the
      # service spec; re-run deploy.sh to pick up .env changes
      - /srv/app/.env
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8749
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PRECHECK_ACCESS_TOKEN: ${PRECHECK_ACCESS_TOKEN:?set PRECHECK_ACCESS_TOKEN (min 24 chars)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      TRUST_PROXY: "1" # Caddy fronts the app; rate limiting needs real client IPs
      PRECHECK_PIPELINE_CONCURRENCY: ${PRECHECK_PIPELINE_CONCURRENCY:-8}
      ANTHROPIC_CONCURRENCY: ${ANTHROPIC_CONCURRENCY:-8}
      PRECHECK_JOB_RETENTION_DAYS: ${PRECHECK_JOB_RETENTION_DAYS:-0}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: start-first # new task must be running before the old one stops
        failure_action: rollback
      rollback_config:
        order: start-first
