services:

  precheck:
    image: shaunders/precheck:latest
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      APP_DEBUG: "false"
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      APP_URL: ${APP_URL}
    ports:
      - "8000:80"
#    volumes:
#      - media_library:/var/www/storage/media-library
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
        monitor: 15s


  api:
    image: shaunders/precheck-api:latest
    stop_grace_period: 16m # drain window; deploy only while unrestricted reports are idle
    ports:
      - "8888:8749"
    env_file:
      # stack deploy reads this at deploy time and bakes values into the
      # service spec; re-run deploy.sh to pick up .env changes
      - /srv/app/.env
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8749
      REDIS_URL: ${REDIS_URL}
      # v1.48.1 measurement mode: no whole-job wall-clock cutoff. Provider
      # request timeouts, cancellation, progress, and restart cleanup remain.
      PRECHECK_JOB_MAX_MINUTES: "0"
      # v1.49.2 paired measurement only. Observe after legacy artifacts are
      # finalized; this must not affect content, cost, quality, or delivery.
      PRECHECK_SURFACE_REGISTRY_OBSERVE: "true"
      PRECHECK_ACCESS_TOKEN: ${PRECHECK_ACCESS_TOKEN:?set PRECHECK_ACCESS_TOKEN (min 24 chars)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TERRA_MODEL: ${OPENAI_TERRA_MODEL:-}
      OPENAI_SOL_MODEL: ${OPENAI_SOL_MODEL:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      TRUST_PROXY: "1" # Caddy fronts the app; rate limiting needs real client IPs
      ANTHROPIC_CONCURRENCY: ${ANTHROPIC_CONCURRENCY:-8}
      OPENAI_CONCURRENCY: ${OPENAI_CONCURRENCY:-8}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        # Both tasks share one Redis namespace. Starting the new task first
        # would clear the old task's in-progress jobs during startup cleanup.
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
