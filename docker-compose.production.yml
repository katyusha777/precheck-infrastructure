services:

  app:
    image: shaunders/precheck
    depends_on:
        api:
          condition:service_healthy
    environment:

  api:
    image: shaunders/precheck-api:latest
    restart: unless-stopped
    stop_grace_period: 45s # let in-flight report steps drain on deploys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8749
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PRECHECK_ACCESS_TOKEN: ${PRECHECK_ACCESS_TOKEN:?set PRECHECK_ACCESS_TOKEN (min 24 chars)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      TRUST_PROXY: "1" # Caddy fronts the app; rate limiting needs real client IPs
      PRECHECK_PIPELINE_CONCURRENCY: ${PRECHECK_PIPELINE_CONCURRENCY:-8}
      ANTHROPIC_CONCURRENCY: ${ANTHROPIC_CONCURRENCY:-8}
      PRECHECK_JOB_RETENTION_DAYS: ${PRECHECK_JOB_RETENTION_DAYS:-0}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PRECHECK_DOMAIN: ${PRECHECK_DOMAIN:?set PRECHECK_DOMAIN (e.g. precheck.example.com)}
      # htpasswd-style bcrypt hash: `docker run --rm caddy:2-alpine caddy hash-password --plaintext '...'`
      FRONTEND_BASIC_AUTH_USER: ${FRONTEND_BASIC_AUTH_USER:-precheck}
      FRONTEND_BASIC_AUTH_HASH: ${FRONTEND_BASIC_AUTH_HASH:?set FRONTEND_BASIC_AUTH_HASH}
    volumes:
      - ./deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - precheck-caddy-data:/data
      - precheck-caddy-config:/config
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - precheck-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }


volumes:
  precheck-redis:
  precheck-caddy-data:
  precheck-caddy-config:
